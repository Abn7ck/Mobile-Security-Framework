name: Mobile Security Audit

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  static-analysis:
    name: Run Static Application Security Testing (SAST)
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Run Semgrep and force a verbose summary layout
      - name: Run Semgrep and Generate Report
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep ci \
            --config=p/android \
            --config=p/owasp-top-ten \
            --verbose \
            --text > security_audit_report.txt || true

      # Step 3: Upload the report document
      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-Security-Audit-Report
          path: security_audit_report.txt
